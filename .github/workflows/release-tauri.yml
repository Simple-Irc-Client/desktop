name: Release Tauri

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v2.0.0)"
        required: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout desktop
        uses: actions/checkout@v6
        with:
          path: desktop

      - name: Checkout core
        uses: actions/checkout@v6
        with:
          repository: Simple-Irc-Client/core
          token: ${{ secrets.SIC_PAT }}
          path: core

      - name: Checkout network-rs
        uses: actions/checkout@v6
        with:
          repository: Simple-Irc-Client/network-rs
          token: ${{ secrets.SIC_PAT }}
          path: network-rs

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            desktop/pnpm-lock.yaml
            core/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri -> target
            network-rs -> target

      - name: Install Linux system deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libdbus-1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install core dependencies
        working-directory: core
        run: pnpm install --frozen-lockfile

      - name: Build renderer (core/dist)
        working-directory: core
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: pnpm build

      - name: Install desktop dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      # Reuse the macOS notarization secrets that the previous Electron
      # release workflow was already using. APPLE_API_KEY_P8 holds the
      # base64-encoded .p8 — decode it to a file path tauri-action expects.
      # When the secret is unset, skip silently and tauri-action will
      # produce a signed-but-not-notarized build.
      - name: Stage Apple notarization key
        if: matrix.target == 'macos'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        shell: bash
        run: |
          if [ -z "$APPLE_API_KEY_P8" ]; then
            echo "APPLE_API_KEY_P8 not set, skipping notarization key staging"
            exit 0
          fi
          KEY_PATH="${RUNNER_TEMP}/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_P8" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build, sign and publish via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater bundle signing (Ed25519, separate from Apple signing).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing — reuses the existing CERTIFICATE_P12 /
          # CERTIFICATE_PASSWORD secrets from the prior Electron workflow.
          APPLE_CERTIFICATE: ${{ secrets.CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          # macOS notarization via App Store Connect API key — reuses the
          # existing APPLE_API_KEY_ID / APPLE_API_ISSUER_ID secrets. The
          # .p8 file is staged by the previous step into APPLE_API_KEY_PATH.
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
        with:
          projectPath: desktop
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Simple Irc Client ${{ github.event.inputs.tag || github.ref_name }}"
          releaseDraft: true
          prerelease: false
          # tauri-action also generates latest.json with per-platform
          # signature pairs and uploads it as a release asset, which is
          # what tauri-plugin-updater's endpoint resolves to.
          updaterJsonPreferNsis: true
