name: E2E macOS

on:
  workflow_dispatch:
    inputs:
      core_ref:
        description: "core branch/tag/sha to test against"
        required: false
        default: "main"
      network_ref:
        description: "network branch/tag/sha"
        required: false
        default: "main"

jobs:
  e2e:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - name: Checkout desktop
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Clone core (${{ github.event.inputs.core_ref }})
        uses: actions/checkout@v6
        with:
          repository: Simple-Irc-Client/core
          ref: ${{ github.event.inputs.core_ref }}
          token: ${{ secrets.SIC_PAT }}
          path: core-src

      - name: Clone network (${{ github.event.inputs.network_ref }})
        uses: actions/checkout@v6
        with:
          repository: Simple-Irc-Client/network
          ref: ${{ github.event.inputs.network_ref }}
          token: ${{ secrets.SIC_PAT }}
          path: network-src

      - name: Build core
        working-directory: core-src
        env:
          VITE_ENCRYPTION_KEY: ${{ secrets.VITE_ENCRYPTION_KEY }}
        run: |
          rm -rf pnpm-lock.yaml node_modules
          pnpm install
          pnpm run build

      - name: Build network
        working-directory: network-src
        env:
          ENCRYPTION_KEY: ${{ secrets.VITE_ENCRYPTION_KEY }}
        run: |
          rm -rf pnpm-lock.yaml node_modules
          pnpm install
          pnpm run build

      - name: Stage built deps into src/
        run: |
          rm -rf src/assets src/index.html src/favicon.ico src/logo.svg src/irc-network.cjs
          cp -r core-src/dist/* src/
          cp network-src/irc-network.js src/irc-network.cjs
          ls -la src/

      - name: Install desktop deps
        # --no-frozen-lockfile because @playwright/test was added but the
        # lockfile in this branch hasn't been regenerated yet.
        run: pnpm install --no-frozen-lockfile

      - name: Run Playwright e2e
        env:
          # Disable update-electron-app network calls during the test run.
          CI: "1"
        run: pnpm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
