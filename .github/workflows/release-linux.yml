name: Release Linux

on:
  workflow_call:
    secrets:
      SIC_PAT:
        required: true
      VITE_SENTRY_DSN:
        required: true
    inputs:
      publish:
        default: false
        required: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install

      - name: Download built deps
        uses: actions/download-artifact@v6
        with:
          name: built-deps
          path: built-deps/

      - name: Copy deps into src
        run: cp -r built-deps/* src/

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y elfutils rpm

      - name: Install snap dependencies
        run: sudo snap install snapcraft --classic --channel=7.x

      - name: Install flatpak dependencies
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08 org.electronjs.Electron2.BaseApp//24.08

      - name: Build electron
        env:
          DEBUG: electron-installer-flatpak*,electron-installer-snap:*,@malept/flatpak-bundler
          FLATPAK_BUILDER_ALLOW_HOST: 1
        run: pnpm run make

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename deb artifact
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DEB_FILE=$(find out/make/deb/x64 -name "*.deb" -type f | head -1)
          mv "$DEB_FILE" "$(dirname "$DEB_FILE")/simple-irc-client-${VERSION}-x86_64.deb"

      - name: Rename rpm artifact
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RPM_FILE=$(find out/make/rpm/x64 -name "*.rpm" -type f | head -1)
          mv "$RPM_FILE" "$(dirname "$RPM_FILE")/simple-irc-client-${VERSION}-x86_64.rpm"

      - name: Rename snap artifact
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SNAP_FILE=$(find out/make/snap/x64 -name "*.snap" -type f | head -1)
          mv "$SNAP_FILE" "$(dirname "$SNAP_FILE")/simple-irc-client-${VERSION}-x86_64.snap"

      - name: Rename flatpak artifact
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          FLATPAK_FILE=$(find out/make/flatpak/x86_64 -name "*.flatpak" -type f | head -1)
          mv "$FLATPAK_FILE" "$(dirname "$FLATPAK_FILE")/simple-irc-client-${VERSION}-x86_64.flatpak"

      - name: Upload deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: deb
          path: out/make/deb/x64/*.deb
          if-no-files-found: error

      - name: Upload packages to release
        if: ${{ inputs.publish }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.SIC_PAT }}
        run: |
          gh release upload "v${{ steps.version.outputs.version }}" \
            out/make/deb/x64/*.deb \
            out/make/rpm/x64/*.rpm \
            out/make/snap/x64/*.snap \
            out/make/flatpak/x86_64/*.flatpak \
            --clobber
